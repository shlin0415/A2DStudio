script_name: 偶尔出去玩玩吧
intro_chapter: main
description: 和钦灵一起去公园玩吧！
recommand_start: 想和钦灵出去玩的时候~

# ===== 羁绊冒险专属配置 =====
adventure:
  # 标记为羁绊冒险剧本
  is_adventure: true

  # 绑定的主角色文件夹名（对应 characters/ 下的目录名）
  bound_character_folder: "诺一钦灵"

  # 冒险排序（决定在角色卡中的显示顺序和解锁链关系）
  order: 2

  unlock_conditions:
    - type: adventure_completed
      adventure_folder: "小狼的爱好"

  # 触发方式
  trigger:
    mode: "manual" # manual | auto_random | auto_immediate

script_settings:
  user_name: ""
